name: Android CI
on:
  push:
    branches:
      - "main"

  pull_request:
    branches:
      - "main"
      - "feature"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: import set up
        uses: ./.github/actions/android-setup

      - name: Build project
        run: ./gradlew build

      - name: Run Unit Test
        run: ./gradlew testDebugUnitTest

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: import set up
        uses: ./.github/actions/android-setup

      - name: Run Unit Test
        run: ./gradlew testDebugUnitTest



